# Default: start infra services (run API locally with pnpm run dev)
#   docker compose up -d
# Starts:
#   - postgres
#   - redis
#   - qdrant
#   - crawl4ai

services:
  # ─── POSTGRES ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rag_pass
      POSTGRES_DB: url_rag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_rag_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── REDIS (redis-stack: Redis + Redis Insight on 8001) ───────────────────
  redis:
    image: redis/redis-stack:latest
    container_name: rag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"   # Redis
      - "8001:8001"   # Redis Insight UI
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── QDRANT ───────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: WARN
    healthcheck:
      # Image has no curl; use bash /dev/tcp to hit /healthz
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e 'GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'HTTP/1.1 200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── CRAWL4AI (Tier 1 scraper) ─────────────────────────────────────────────
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: rag_crawl4ai
    restart: unless-stopped
    shm_size: "1g"
    ports:
      - "11235:11235"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
